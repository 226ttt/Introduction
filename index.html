<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Free-Typing Calculator Suite</title>
    <!-- โหลด Library สำหรับคำนวณและวาดกราฟ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .hub-header { text-align: center; margin-bottom: 15px; }
        .hub-header h1 { color: #4B8BBE; margin: 0 0 5px 0; }
        .hub-header h1 span { color: #FFD43B; }
        
        .controls-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        .version-switcher { display: flex; gap: 10px; }
        .tab-btn {
            background-color: #3d3d3d; color: #aaa; border: none; padding: 10px 15px;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s;
        }
        .tab-btn:hover { background-color: #4f4f4f; color: #fff; }
        .tab-btn.active { background-color: #4B8BBE; color: white; }

        .fraction-toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #1a1a1a;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #555;
        }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .3s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #FFD43B; }
        input:checked + .slider:before { transform: translateX(22px); }
        .toggle-label { font-size: 13px; font-weight: bold; color: #FFD43B; }

        /* ตัวเครื่องคิดเลข */
        .calculator-card {
            background-color: #2b2b2b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        .screen-container { position: relative; margin-bottom: 15px; }
        .mode-indicator { position: absolute; top: 5px; left: 10px; font-size: 10px; color: #666; font-weight: bold; }
        
        /* เปลี่ยนเป็นแบบกรอกและพิมพ์ได้อิสระ */
        .calc-screen {
            width: 100%; height: 60px; background-color: #111; border: 1px solid #4B8BBE;
            border-radius: 6px; color: #39FF14; font-size: 22px; text-align: left;
            padding: 20px 10px 5px 10px; box-sizing: border-box; font-family: inherit;
        }
        .calc-screen:focus {
            outline: none; border-color: #FFD43B; box-shadow: 0 0 8px rgba(255,212,59,0.3);
        }
        
        .button-grid { display: grid; gap: 8px; }
        .grid-std { grid-template-columns: repeat(4, 1fr); }
        .grid-sci { grid-template-columns: repeat(5, 1fr); }
        
        button {
            padding: 12px 5px; font-size: 16px; cursor: pointer; border: none;
            border-radius: 4px; background-color: #3a3a3a; color: white; font-family: inherit;
        }
        button:hover { background-color: #505050; }
        button.operator { background-color: #4B8BBE; }
        button.sci-fn { background-color: #243447; color: #8da2fb; font-size: 14px; }
        button.equal { background-color: #FFD43B; color: #111; font-weight: bold; }
        button.equal:hover { background-color: #ffe169; }
        button.clear { background-color: #d32f2f; }

        .graph-interface { display: none; }
        .graph-window { background-color: white; border-radius: 6px; padding: 8px; margin-top: 15px; }
        .type-hint { font-size: 11px; color: #888; text-align: center; margin-top: -8px; margin-bottom: 12px; }

        /* หน้าจอแสดงโค้ด Python */
        .python-ide {
            margin-top: 20px; background-color: #121212; padding: 15px; border-radius: 6px;
            font-size: 12px; color: #a9b7c6; border-left: 4px solid #FFD43B;
            overflow-x: auto; white-space: pre-line; line-height: 1.5;
        }
        .keyword { color: #cc7832; }
        .comment { color: #629755; font-style: italic; }
        .builtin { color: #8888c6; }
    </style>
</head>
<body>

<div class="hub-header">
    <h1>🐍 Python <span>CalcSuite v3</span></h1>
</div>

<div class="controls-panel">
    <div class="version-switcher">
        <button class="tab-btn active" onclick="switchVersion('standard', this)">Standard</button>
        <button class="tab-btn" onclick="switchVersion('scientific', this)">Scientific</button>
        <button class="tab-btn" onclick="switchVersion('graphing', this)">Graphing</button>
    </div>
    
    <div class="fraction-toggle-container" id="fraction-box">
        <span class="toggle-label">Fraction Output Mode (หารเศษส่วน)</span>
        <label class="switch">
            <input type="checkbox" id="fraction-mode-toggle" onchange="toggleFractionMode()">
            <span class="slider"></span>
        </label>
    </div>
</div>

<div class="calculator-card">
    <!-- หน้าจอแบบ Input พิมพ์ได้เสรีสำหรับทุกโหมด -->
    <div class="screen-container">
        <div class="mode-indicator" id="mode-text">Standard Mode</div>
        <input type="text" id="screen" class="calc-screen" value="" placeholder="คลิกเพื่อพิมพ์สมการได้อย่างอิสระ...">
    </div>
    <div class="type-hint">💡 พิมพ์จากคีย์บอร์ดแล้วกด <strong>Enter</strong> เพื่อคำนวณได้เลย</div>

    <!-- โหมด 1: มาตรฐาน -->
    <div id="calc-standard" class="button-grid grid-std calc-interface">
        <button class="clear" onclick="pressClear()">C</button>
        <button class="operator" onclick="pressOp('**')">xʸ</button>
        <button class="operator" onclick="pressOp('%')">%</button>
        <button class="operator" onclick="pressOp('/')">/</button>
        <button onclick="pressBtn('7')">7</button><button onclick="pressBtn('8')">8</button><button onclick="pressBtn('9')">9</button>
        <button class="operator" onclick="pressOp('*')">*</button>
        <button onclick="pressBtn('4')">4</button><button onclick="pressBtn('5')">5</button><button onclick="pressBtn('6')">6</button>
        <button class="operator" onclick="pressOp('-')">-</button>
        <button onclick="pressBtn('1')">1</button><button onclick="pressBtn('2')">2</button><button onclick="pressBtn('3')">3</button>
        <button class="operator" onclick="pressOp('+')">+</button>
        <button onclick="pressBtn('0')" style="grid-column: span 2;">0</button>
        <button onclick="pressBtn('.')">.</button>
        <button class="equal" onclick="executeCalculation()">=</button>
    </div>

    <!-- โหมด 2: วิทยาศาสตร์ -->
    <div id="calc-scientific" class="button-grid grid-sci calc-interface" style="display: none;">
        <button class="sci-fn" onclick="pressBtn('sin(')">sin</button>
        <button class="sci-fn" onclick="pressBtn('cos(')">cos</button>
        <button class="sci-fn" onclick="pressBtn('tan(')">tan</button>
        <button class="sci-fn" onclick="pressBtn('pi')">π</button>
        <button class="clear" onclick="pressClear()">C</button>
        <button class="sci-fn" onclick="pressBtn('log10(')">log</button>
        <button class="sci-fn" onclick="pressBtn('log(')">ln</button>
        <button class="sci-fn" onclick="pressBtn('sqrt(')">√</button>
        <button class="sci-fn" onclick="pressBtn('e')">e</button>
        <button class="operator" onclick="pressOp('/')">/</button>
        <button class="sci-fn" onclick="pressOp('^')">xʸ</button>
        <button onclick="pressBtn('7')">7</button><button onclick="pressBtn('8')">8</button><button onclick="pressBtn('9')">9</button>
        <button class="operator" onclick="pressOp('*')">*</button>
        <button class="sci-fn" onclick="pressBtn('(')">(</button>
        <button onclick="pressBtn('4')">4</button><button onclick="pressBtn('5')">5</button><button onclick="pressBtn('6')">6</button>
        <button class="operator" onclick="pressOp('-')">-</button>
        <button class="sci-fn" onclick="pressBtn(')')">)</button>
        <button onclick="pressBtn('1')">1</button><button onclick="pressBtn('2')">2</button><button onclick="pressBtn('3')">3</button>
        <button class="operator" onclick="pressOp('+')">+</button>
        <button onclick="pressBtn('0')" style="grid-column: span 2;">0</button>
        <button onclick="pressBtn('.')">.</button>
        <button class="equal" onclick="executeCalculation()" style="grid-column: span 2;">=</button>
    </div>

    <!-- โหมด 3: กราฟิก -->
    <div id="calc-graphing" class="graph-interface">
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 8px;">
            <button class="equal" onclick="plotGraphData()" style="padding: 10px;">Plot Graph (วาดกราฟ)</button>
            <button style="background-color: #555;" onclick="pressClear()">Clear</button>
        </div>
        <div class="graph-window"><canvas id="hubGraphCanvas"></canvas></div>
    </div>

    <!-- กล่องคอนโซล Python IDE -->
    <div class="python-ide" id="ide-terminal"></div>
</div>

<script>
    let currentMode = 'standard';
    let chartObj = null;
    let isFractionMode = false;
    const screenInput = document.getElementById("screen");

    window.onload = function() {
        resetIDE();
        // ผูก Event ดักจับสิ่งที่ผู้ใช้พิมพ์ผ่านคีย์บอร์ดคอมพิวเตอร์
        screenInput.addEventListener("input", function() {
            updateLivePreview(screenInput.value);
        });
        
        screenInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                if (currentMode === 'graphing') {
                    plotGraphData();
                } else {
                    executeCalculation();
                }
            }
        });
    };

    function toggleFractionMode() {
        isFractionMode = document.getElementById('fraction-mode-toggle').checked;
        if (screenInput.value !== "") {
            executeCalculation();
        } else {
            resetIDE();
        }
    }

    function switchVersion(mode, btnElement) {
        currentMode = mode;
        screenInput.value = "";
        
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        document.querySelectorAll('.calc-interface').forEach(el => el.style.display = 'none');
        document.getElementById('calc-graphing').style.display = 'none';
        document.getElementById('fraction-box').style.display = 'flex';

        if(mode === 'standard') {
            document.getElementById('calc-standard').style.display = 'grid';
            document.getElementById('mode-text').innerText = "Standard Mode";
            screenInput.placeholder = "คลิกเพื่อพิมพ์สมการได้อย่างอิสระ...";
            resetIDE();
        } else if(mode === 'scientific') {
            document.getElementById('calc-scientific').style.display = 'grid';
            document.getElementById('mode-text').innerText = "Scientific Mode";
            screenInput.placeholder = "พิมพ์สูตร เช่น sin(pi/4) หรือ 2^3...";
            resetIDE();
        } else if(mode === 'graphing') {
            document.getElementById('calc-graphing').style.display = 'block';
            document.getElementById('mode-text').innerText = "Graphing Mode";
            document.getElementById('fraction-box').style.display = 'none';
            screenInput.value = "x^2"; // ค่าตั้งต้นสำหรับโหมดกราฟ
            screenInput.placeholder = "ระบุฟังก์ชัน x เช่น x^2 - 4 หรือ sin(x)...";
            plotGraphData();
        }
    }

    function pressBtn(val) {
        screenInput.value += val;
        screenInput.focus();
        updateLivePreview(screenInput.value);
    }

    function pressOp(op) {
        screenInput.value += op;
        screenInput.focus();
        updateLivePreview(screenInput.value);
    }

    function pressClear() {
        screenInput.value = "";
        screenInput.focus();
        resetIDE();
    }

    function resetIDE() {
        let importStatement = "";
        if (isFractionMode) {
            importStatement = '<span class="keyword">from</span> fractions <span class="keyword">import</span> Fraction\n';
        } else if (currentMode === 'scientific') {
            importStatement = '<span class="keyword">import</span> math\n';
        } else if (currentMode === 'graphing') {
            importStatement = '<span class="keyword">import</span> matplotlib.pyplot <span class="keyword">as</span> plt\n<span class="keyword">import</span> numpy <span class="keyword">as</span> np\n';
        }
        document.getElementById("ide-terminal").innerHTML = `${importStatement}<span class="comment"># Ready to compute...</span>`;
    }

    function updateLivePreview(expr) {
        let header = "";
        if (isFractionMode) {
            header = '<span class="keyword">from</span> fractions <span class="keyword">import</span> Fraction\n\n';
        } else if (currentMode === 'scientific') {
            header = '<span class="keyword">import</span> math\n\n';
        } else if (currentMode === 'graphing') {
            header = '<span class="keyword">import</span> matplotlib.pyplot <span class="keyword">as</span> plt\n<span class="keyword">import</span> numpy <span class="keyword">as</span> np\n\n';
        }
        let pySyntax = transpileToPython(expr);
        document.getElementById("ide-terminal").innerHTML = `${header}<span class="comment"># Live IDE Sync Preview</span>\nformula = "${pySyntax}"`;
    }

    function convertToPythonFraction(expr) {
        return expr.replace(/(\d+)\s*\/\s*(\d+)/g, "Fraction($1, $2)");
    }

    function transpileToPython(expr) {
        let res = expr;
        if(currentMode === 'scientific') {
            res = res.replace(/sin/g, "math.sin").replace(/cos/g, "math.cos").replace(/tan/g, "math.tan");
            res = res.replace(/log10/g, "math.log10").replace(/log/g, "math.log").replace(/sqrt/g, "math.sqrt");
            res = res.replace(/pi/g, "math.pi").replace(/e/g, "math.e");
        } else if(currentMode === 'graphing') {
            res = res.replace(/sin/g, "np.sin").replace(/cos/g, "np.cos").replace(/tan/g, "np.tan");
            res = res.replace(/sqrt/g, "np.sqrt").replace(/log/g, "np.log");
        }
        res = res.replace(/\^/g, "**"); 
        if (isFractionMode) {
            res = convertToPythonFraction(res);
        }
        return res;
    }

    function executeCalculation() {
        let textExpression = screenInput.value;
        if (textExpression.trim() === "") return;

        try {
            let finalResult;
            let displayOutput;
            
            if (isFractionMode) {
                let calculated = math.fraction(math.evaluate(textExpression));
                finalResult = calculated;
                displayOutput = calculated.d === 1 ? `${calculated.s * calculated.n}` : `${calculated.s * calculated.n}/${calculated.d}`;
            } else {
                let calculated = math.evaluate(textExpression);
                if (typeof calculated === 'number' && !Number.isInteger(calculated)) {
                    calculated = Math.round(calculated * 1000000) / 1000000;
                }
                finalResult = calculated;
                displayOutput = calculated.toString();
            }

            screenInput.value = displayOutput;

            let pyFormula = transpileToPython(textExpression);
            let importLine = isFractionMode ? '<span class="keyword">from</span> fractions <span class="keyword">import</span> Fraction\n' : (currentMode === 'scientific' ? '<span class="keyword">import</span> math\n' : '');
            
            document.getElementById("ide-terminal").innerHTML = `
                ${importLine}<span class="comment"># Executed Python Script</span>
                result = ${pyFormula}
                <span class="builtin">print</span>(result)
                <span class="comment"># >>> Output: ${displayOutput}</span>
            `.trim();
            
        } catch(e) {
            document.getElementById("ide-terminal").innerHTML = `<span class="keyword">raise</span> <span class="builtin">SyntaxError</span>(<span class="builtin">"สมการหรือสัญลักษณ์คณิตศาสตร์ไม่สมบูรณ์"</span>)`;
        }
    }

    function plotGraphData() {
        const formula = screenInput.value;
        if (formula.trim() === "") return;

        const xCoords = []; const yCoords = [];
        for (let x = -10; x <= 10; x += 0.5) {
            try {
                let y = math.evaluate(formula, { x: x });
                if (typeof y === 'number' && isFinite(y)) { xCoords.push(x); yCoords.push(y); }
            } catch(e) { 
                document.getElementById("ide-terminal").innerHTML = `<span class="keyword">raise</span> <span class="builtin">ValueError</span>(<span class="builtin">"ไม่สามารถวาดกราฟได้ ตรวจสอบว่าใส่เครื่องหมายคูณ เช่น 2*x หรือยัง"</span>)`;
                return; 
            }
        }
        const ctx = document.getElementById('hubGraphCanvas').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: xCoords,
                datasets: [{ label: `f(x) = ${formula}`, data: yCoords, borderColor: '#FFD43B', borderWidth: 2, pointRadius: 0, fill: false }]
            },
            options: { responsive: true }
        });
        
        let pyEquation = transpileToPython(formula);
        document.getElementById("ide-terminal").innerHTML = `
            <span class="comment"># Python Data-Viz Script</span>
            <span class="keyword">import</span> matplotlib.pyplot <span class="keyword">as</span> plt
            <span class="keyword">import</span> numpy <span class="keyword">as</span> np
            x = np.linspace(-10, 10, 100)
            y = ${pyEquation}
            plt.plot(x, y, color='#FFD43B', label="f(x) = ${formula}")
            plt.grid(<span class="keyword">True</span>)
            plt.legend()
            plt.show()
        `.trim();
    }
</script>

</body>
</html>
